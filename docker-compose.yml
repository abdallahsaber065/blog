services:
  postgres:
    image: postgres:18-alpine
    container_name: blog_db
    environment:
      POSTGRES_USER: blog_username
      POSTGRES_PASSWORD: Password_00110011
      POSTGRES_DB: blog_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_username -d blog_db"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
    driver: local

networks:
  blog-network:
    driver: bridge
